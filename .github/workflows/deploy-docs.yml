name: deploy-docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# Allow the deploy job to publish to GitHub Pages via OIDC
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm i -g --force corepack@latest && corepack enable

      - name: Install dependencies
        run: npx nypm@latest i

      - name: Generate docs
        run: pnpm --filter nuxt-permission-docs generate
        env:
          # Project page lives under a subpath: https://nowo.github.io/nuxt-permission/
          NUXT_APP_BASE_URL: /nuxt-permission/
          # github_pages preset emits .nojekyll (so /_nuxt is served) and 404.html
          NITRO_PRESET: github_pages

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
